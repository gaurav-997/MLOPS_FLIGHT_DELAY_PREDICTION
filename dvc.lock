    params:
      params.yaml:
        data_ingestion:
          flights_file: delay_data/flights_sample.csv
          airports_file: delay_data/airports.csv
          airlines_file: delay_data/airlines.csv
          holidays_file: delay_data/holidays.csv
          weather_file: delay_data/weather_data.csv
        data_transformation:
          test_size: 0.2
          random_state: 42
        data_validation:
          drift_threshold: 0.05
        model_evaluation:
          change_threshold: 0.02
        model_trainer:
          expected_score: 0.6
          overfitting_threshold: 0.1
