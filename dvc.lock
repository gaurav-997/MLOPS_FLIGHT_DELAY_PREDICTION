            random_forest:
              n_estimators: 50
              max_depth: 10
              max_features: sqrt
            gradient_boosting:
              n_estimators: 50
              max_depth: 4
              learning_rate: 0.1
            xgboost:
              n_estimators: 50
              max_depth: 5
              learning_rate: 0.1
            lightgbm:
              n_estimators: 50
              max_depth: 5
              learning_rate: 0.1
            ridge:
              alpha: 1.0
