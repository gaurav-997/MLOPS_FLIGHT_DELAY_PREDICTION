stages:

  training_pipeline:
    cmd: python training_pipeline.py
    deps:
      - delay_data/flights_sample.csv
      - delay_data/airports.csv
      - delay_data/airlines.csv
      - delay_data/holidays.csv
      - delay_data/weather_data.csv
      - flightdelay/components/dataingestion.py
      - flightdelay/components/datavalidation.py
      - flightdelay/components/datatransformation.py
      - flightdelay/components/modeltraining.py
      - flightdelay/components/modelevaluation.py
      - flightdelay/utils/ml_utils/mlflow_utils.py
    params:
      - params.yaml:
          - data_ingestion
          - data_validation
          - data_transformation
          - model_trainer
          - model_evaluation
    outs:
      - final_model:
          persist: true
          cache: true

  # model_pusher stage is intentionally omitted (S3 bucket setup pending)
